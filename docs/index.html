<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>arc42 &amp; LASR — Architecture Documentation that Works</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Karla:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="dist/reset.css">
    <link rel="stylesheet" href="dist/reveal.css">
    <link rel="stylesheet" href="dist/theme/white.css">
    <link rel="stylesheet" href="dist/plugin/highlight/monokai.css">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
<div class="reveal">
    <div class="slides">

        <!-- Slide 1: Title (kept inline so the first slide is visible immediately) -->
        <section class="slide-title"
                 data-background-image="./img/title-bg.jpeg"
                 data-background-position="right center"
                 data-background-size="95% auto">
            <div class="title-content">
                <p class="title-date" id="slide-date"></p>
                <h1>arc42 &amp; LASR</h1>
                <p class="title-subtitle">Playful system insights for sustainable improvements</p>
                <div class="title-author-block">
                    <p class="title-author">by Mariano Mertinat</p>
                    <p class="title-role">software-solution-architect, trainer, nerd, father</p>
                </div>
            </div>
            <aside aria-label="speaker notes" class="notes">
            </aside>
        </section>

    </div>
</div>

<script>
    document.getElementById('slide-date').textContent =
        new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
</script>
<script src="dist/reveal.js"></script>
<script src="dist/plugin/notes.js"></script>
<script src="dist/plugin/markdown.js"></script>
<script src="dist/plugin/search.js"></script>
<script src="dist/plugin/zoom.js"></script>
<script src="dist/plugin/highlight.js"></script>
<script>
    const SLIDES = [
        './slides/slide-02.html',
        './slides/slide-03.html',
        './slides/slide-04.html',
        './slides/slide-05.html',
        './slides/slide-06.html',
        './slides/slide-07.html',

        './slides/slide-18.html',
        './slides/slide-19.html',
        './slides/slide-20.html',

        './slides/slide-51.html',
        './slides/slide-52.html',
        './slides/slide-53.html',
    ];

    async function loadSlides() {
        const container = document.querySelector('.slides');
        const fragments = await Promise.all(SLIDES.map(url => fetch(url).then(r => r.text())));
        fragments.forEach(html => container.insertAdjacentHTML('beforeend', html));

        Reveal.initialize({
            hash: true,
            slideNumber: "c/t",
            history: true,
            mouseWheel: true,
            transition: 'fade',
            navigationMode: "linear",
            plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealSearch, RevealZoom ]
        });
    }

    loadSlides();
</script>
</body>
</html>
