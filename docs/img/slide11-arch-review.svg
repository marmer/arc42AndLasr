<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg"
     aria-label="Circle split: Business and Domain (left), Technical and Quality (right), unified as Architecture and System Reviews">
    <defs>
        <clipPath id="clip-left">
            <rect x="0" y="0" width="320" height="400"/>
        </clipPath>
        <clipPath id="clip-right">
            <rect x="320" y="0" width="320" height="400"/>
        </clipPath>
    </defs>

    <!-- Halves -->
    <circle cx="320" cy="200" r="155" fill="#3390C3" fill-opacity="0.13" clip-path="url(#clip-left)"/>
    <circle cx="320" cy="200" r="155" fill="#6CCBB2" fill-opacity="0.18" clip-path="url(#clip-right)"/>
    <!-- Ring -->
    <circle cx="320" cy="200" r="155" fill="none" stroke="#6CCBB2" stroke-width="9"/>
    <!-- Divider -->
    <line x1="320" y1="45" x2="320" y2="355" stroke="#1B1B1B" stroke-width="1.2" stroke-opacity="0.2"/>

    <!-- LEFT ICONS: Business &amp; Domain -->

    <!-- Document (requirements) -->
    <g transform="translate(255,128)">
        <path d="M-12,-16 L8,-16 L16,-8 L16,16 L-12,16 Z" fill="rgba(51,144,195,0.15)" stroke="#3390C3" stroke-width="2" stroke-linejoin="round"/>
        <path d="M8,-16 L8,-8 L16,-8" fill="none" stroke="#3390C3" stroke-width="1.5" stroke-linejoin="round"/>
        <line x1="-6" y1="-1" x2="9" y2="-1" stroke="#3390C3" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-6" y1="6" x2="9" y2="6" stroke="#3390C3" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-6" y1="13" x2="3" y2="13" stroke="#3390C3" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Speech bubble (domain language) -->
    <g transform="translate(205,207)">
        <path d="M-14,-13 Q-14,-18 -9,-18 L11,-18 Q16,-18 16,-13 L16,2 Q16,7 11,7 L2,7 L-2,15 L-4,7 L-9,7 Q-14,7 -14,2 Z" fill="rgba(51,144,195,0.15)" stroke="#3390C3" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="-5" cy="-5" r="2" fill="#3390C3"/>
        <circle cx="1" cy="-5" r="2" fill="#3390C3"/>
        <circle cx="7" cy="-5" r="2" fill="#3390C3"/>
    </g>

    <!-- People (stakeholders) -->
    <g transform="translate(258,280)">
        <circle cx="-7" cy="-11" r="5.5" fill="rgba(51,144,195,0.15)" stroke="#3390C3" stroke-width="1.8"/>
        <path d="M-16,8 C-16,-2 2,-2 2,8" fill="rgba(51,144,195,0.15)" stroke="#3390C3" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="7" cy="-13" r="5" fill="rgba(51,144,195,0.12)" stroke="#3390C3" stroke-width="1.8"/>
        <path d="M-1,8 C-1,-3 16,-3 16,8" fill="rgba(51,144,195,0.12)" stroke="#3390C3" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- RIGHT ICONS: Technical &amp; Quality -->

    <!-- Gear -->
    <g transform="translate(385,128)">
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(45)"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(90)"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(135)"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(180)"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(225)"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(270)"/>
        <rect x="-3" y="-18" width="6" height="9" rx="1.2" fill="rgba(108,203,178,0.25)" stroke="#6CCBB2" stroke-width="1.5" transform="rotate(315)"/>
        <circle r="9.5" fill="rgba(108,203,178,0.2)" stroke="#6CCBB2" stroke-width="2"/>
        <circle r="4" fill="white" stroke="#6CCBB2" stroke-width="1.5"/>
    </g>

    <!-- Code brackets -->
    <g transform="translate(435,207)">
        <text text-anchor="middle" dominant-baseline="middle" font-family="'Courier New',monospace" font-weight="900" font-size="30" fill="#6CCBB2">&lt;/&gt;</text>
    </g>

    <!-- Shield + checkmark -->
    <g transform="translate(385,280)">
        <path d="M0,-18 L14,-11 L14,1 C14,11 7,18 0,22 C-7,18 -14,11 -14,1 L-14,-11 Z" fill="rgba(108,203,178,0.2)" stroke="#6CCBB2" stroke-width="2" stroke-linejoin="round"/>
        <polyline points="-6,2 -1,9 9,-5" fill="none" stroke="#6CCBB2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Labels outside the circle -->
    <text x="82" y="192" text-anchor="middle" font-family="DM Sans, Helvetica Neue, sans-serif" font-weight="700" font-size="20" fill="#1B1B1B">Business &amp;</text>
    <text x="82" y="216" text-anchor="middle" font-family="DM Sans, Helvetica Neue, sans-serif" font-weight="700" font-size="20" fill="#1B1B1B">Domain</text>
    <text x="558" y="192" text-anchor="middle" font-family="DM Sans, Helvetica Neue, sans-serif" font-weight="700" font-size="20" fill="#1B1B1B">Technical &amp;</text>
    <text x="558" y="216" text-anchor="middle" font-family="DM Sans, Helvetica Neue, sans-serif" font-weight="700" font-size="20" fill="#1B1B1B">Quality</text>
</svg>
